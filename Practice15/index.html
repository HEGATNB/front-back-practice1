<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои задачи | Task Manager</title>

    <link rel="manifest" href="/manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a6cf7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Задачи">

    <link rel="apple-touch-icon" href="/icons/launchericon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/launchericon-48x48.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/launchericon-48x48.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title">
                Мои задачи
            </h1>

                <button id="home-btn" class="nav-tab active">
                    <i class="fas fa-edit"></i> Задачи
                </button>
                <button id="about-btn" class="nav-tab">
                    <i class="fas fa-info-circle"></i> О приложении
                </button>
            </div>
            <div id="status" class="status status--online">
                Онлайн
            </div>
        </header>

        <main id="app-content" class="app-content">
        </main>

        <footer class="footer">
            <div id="stats" class="footer__stats">

        </footer>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои задачи | Task Manager</title>

    <link rel="manifest" href="/manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a6cf7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Задачи">

    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title">Мои задачи</h1>
            <div id="status" class="status status--online">Онлайн</div>
        </header>

        <form id="task-form" class="task-form">
            <div class="task-form__group">
                <input
                    type="text"
                    id="task-input"
                    class="task-form__input"
                    placeholder="Добавить новую задачу..."
                    required
                >
                <input
                    type="date"
                    id="task-date"
                    class="task-form__date"
                >
                <button type="submit" class="task-form__button">Добавить</button>
            </div>
        </form>

        <div id="task-list" class="task-list"></div>

        <footer class="footer">
            <div id="stats" class="footer__stats"></div>
        </footer>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal__content">
            <h2 class="modal__title">Редактировать задачу</h2>
            <input type="text" id="edit-input" class="modal__input" placeholder="Текст задачи">
            <input type="date" id="edit-date" class="modal__date">
            <div class="modal__actions">
                <button id="cancel-edit" class="modal__button modal__button--cancel">Отмена</button>
                <button id="save-edit" class="modal__button modal__button--save">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
